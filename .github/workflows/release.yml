name: Release PDF

on:
  workflow_run:
    workflows:
      - CI Build
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer-Komponente
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.conclusion == 'success')
    uses: lhliddal/zsf-template-hliddal/.github/workflows/release-reusable.yml@main
    with:
      bump: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
      release_sha: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
