name: Release PDF

# Nur manueller Fallback. Der kanonische Release-Weg ist lokal:
# `make release-patch` / `make release-minor` (scripts/release-local.sh),
# damit der Release-Autor lhliddal ist statt github-actions[bot].
# Kein push-Trigger — sonst würde jeder Push nach main automatisch veröffentlichen
# und dem dokumentierten lokalen Flow widersprechen.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-extra \
            texlive-fonts-extra \
            texlive-science \
            texlive-lang-german \
            poppler-utils
      - name: Build PDF
        run: make build
      - name: Resolve PDF name
        id: pdf
        run: echo "name=$(make -s print-pdf-basename)" >> "$GITHUB_OUTPUT"
      - name: Generate release hash
        run: make release-proof
      - name: Determine next release tag
        id: version
        shell: bash
        run: |
          git fetch --tags --force
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [[ "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
          else
            major=2
            minor=0
            patch=-1
          fi
          next_tag="v${major}.${minor}.$((patch + 1))"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
      - name: Push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "refs/tags/${{ steps.version.outputs.tag }}"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: Update auf neue Version.
          files: |
            ${{ steps.pdf.outputs.name }}.pdf
            build/main.pdf.sha256
