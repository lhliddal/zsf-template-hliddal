name: Reusable ZSF Release

on:
  workflow_call:
    inputs:
      bump:
        description: SemVer-Komponente, die erhoeht wird
        required: true
        type: string
      release_sha:
        description: Exakter Commit, der gebaut und getaggt wird
        required: true
        type: string
      publish_to_r2:
        description: Aktuelle PDF und Source-ZIP nach R2 synchronisieren
        required: false
        default: false
        type: boolean
      r2_bucket:
        description: Privater R2-Bucket für aktive ZSFs
        required: false
        default: garcon-zsf-active
        type: string
    secrets:
      r2_access_key_id:
        required: false
      r2_secret_access_key:
        required: false
      cloudflare_account_id:
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      pdf_name: ${{ steps.pdf.outputs.name }}
      release_tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_sha }}

      - name: Determine release version
        id: version
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          case "$BUMP" in
            patch|minor|major) ;;
            *)
              echo "Unsupported bump: $BUMP" >&2
              exit 2
              ;;
          esac

          git fetch --tags --force
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi
          if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag is not SemVer: $latest_tag" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          case "$BUMP" in
            patch) patch=$((patch + 1)) ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            major) major=$((major + 1)); minor=0; patch=0 ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "latest=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $latest_tag"
          echo "Next tag:   $next_tag"

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-extra \
            texlive-fonts-extra \
            texlive-science \
            texlive-lang-german \
            poppler-utils

      - name: Resolve PDF name
        id: pdf
        run: echo "name=$(make -s print-pdf-basename)" >> "$GITHUB_OUTPUT"

      - name: Build versioned release artifact
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          make clean
          make \
            RELEASE_ID="$RELEASE_TAG" \
            BUILD_STAMP="$(date -u +%Y%m%dT%H%M%SZ)" \
            GIT_COMMIT="${RELEASE_SHA::7}" \
            build
          make release-proof

      - name: Verify PDF release identity
        env:
          PDF_NAME: ${{ steps.pdf.outputs.name }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          metadata="$(pdfinfo "${PDF_NAME}.pdf")"
          grep -F "release=${RELEASE_TAG}" <<< "$metadata"
          grep -F "release-id:${RELEASE_TAG}" <<< "$metadata"

      - name: Create and push release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          git tag "$RELEASE_TAG" "$RELEASE_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PDF_NAME: ${{ steps.pdf.outputs.name }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            "${PDF_NAME}.pdf" \
            build/main.pdf.sha256 \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes

  sync-active-downloads:
    if: ${{ inputs.publish_to_r2 }}
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout published commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}

      - name: Read and validate publish metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          metadata=.github/zsf-publish.json
          jq -e '
            .schemaVersion == 1 and
            (.id | type == "string" and test("^[a-z0-9]+(-[a-z0-9]+)*$")) and
            (.kind == "zsf" or .kind == "template") and
            (.title | type == "string" and length > 0) and
            (.semesterCode | type == "string" and test("^(fs|hs)[0-9]{4}$")) and
            (.semesterLabel | type == "string" and length > 0) and
            (.status == "active" or .status == "archive" or .status == "template") and
            (.githubRepository == env.GITHUB_REPOSITORY) and
            (.pdfFilename | type == "string" and test("^[A-Za-z0-9_.-]+\\.pdf$")) and
            (.presentation | type == "object") and
            (.presentation.drawingNumber | type == "string" and length > 0) and
            (.presentation.description | type == "string" and length > 0) and
            (.presentation.stage == "in-progress" or .presentation.stage == "content-complete" or .presentation.stage == "layout-final") and
            (.presentation.diagram == "physics" or .presentation.diagram == "informatics" or .presentation.diagram == "analysis" or .presentation.diagram == "linalg" or .presentation.diagram == "design" or .presentation.diagram == "mechanics" or .presentation.diagram == "thermo" or .presentation.diagram == "fluids" or .presentation.diagram == "controls" or .presentation.diagram == "materials" or .presentation.diagram == "statistics" or .presentation.diagram == "template") and
            (.presentation.statusLabel == null or (.presentation.statusLabel | type == "string")) and
            (.presentation.credits == null or (.presentation.credits | type == "string"))
          ' "$metadata" >/dev/null
          echo "id=$(jq -r '.id' "$metadata")" >> "$GITHUB_OUTPUT"
          echo "status=$(jq -r '.status' "$metadata")" >> "$GITHUB_OUTPUT"

      - name: Validate protected publication boundary
        if: ${{ steps.metadata.outputs.status == 'active' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          visibility="$(gh repo view "$GITHUB_REPOSITORY" --json visibility --jq .visibility)"
          if [[ "$visibility" != "PRIVATE" ]]; then
            echo "status=active requires a private GitHub repository (found: $visibility)" >&2
            exit 1
          fi

      - name: Validate Cloudflare credentials
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.r2_access_key_id }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.r2_secret_access_key }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.cloudflare_account_id }}
        run: |
          set -euo pipefail
          if [[ -z "$R2_ACCESS_KEY_ID" || -z "$R2_SECRET_ACCESS_KEY" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "Missing R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY or CLOUDFLARE_ACCOUNT_ID repository secret" >&2
            exit 1
          fi
          command -v aws >/dev/null

      - name: Download released PDF
        if: ${{ steps.metadata.outputs.status == 'active' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PDF_NAME: ${{ needs.build-and-release.outputs.pdf_name }}
          RELEASE_TAG: ${{ needs.build-and-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release download "$RELEASE_TAG" --pattern "${PDF_NAME}.pdf" --dir "$RUNNER_TEMP"

      - name: Create protected publish bundle
        if: ${{ steps.metadata.outputs.status == 'active' }}
        shell: bash
        env:
          PDF_NAME: ${{ needs.build-and-release.outputs.pdf_name }}
          PROJECT_ID: ${{ steps.metadata.outputs.id }}
        run: |
          set -euo pipefail
          required_paths=(README.md main.tex preamble.tex Makefile chapters styles)
          optional_paths=(graphics Images figures .latexmkrc)
          archive_paths=()

          for path in "${required_paths[@]}"; do
            if ! git ls-files --error-unmatch "$path" >/dev/null 2>&1 &&
               [[ -z "$(git ls-files "$path/**")" ]]; then
              echo "Required publish path is not tracked: $path" >&2
              exit 1
            fi
            archive_paths+=("$path")
          done

          for path in "${optional_paths[@]}"; do
            if git ls-files --error-unmatch "$path" >/dev/null 2>&1 ||
               [[ -n "$(git ls-files "$path/**")" ]]; then
              archive_paths+=("$path")
            fi
          done

          output="$RUNNER_TEMP/zsf-publish"
          mkdir -p "$output"
          cp "$RUNNER_TEMP/${PDF_NAME}.pdf" "$output/latest.pdf"
          git archive \
            --format=zip \
            --prefix="$PROJECT_ID/" \
            --output="$output/latest-source.zip" \
            HEAD \
            -- "${archive_paths[@]}"

          pdf_size="$(wc -c < "$output/latest.pdf" | tr -d ' ')"
          source_size="$(wc -c < "$output/latest-source.zip" | tr -d ' ')"
          pdf_sha256="$(sha256sum "$output/latest.pdf" | awk '{print $1}')"
          source_sha256="$(sha256sum "$output/latest-source.zip" | awk '{print $1}')"
          published_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          jq -n \
            --slurpfile project .github/zsf-publish.json \
            --arg commit "$(git rev-parse HEAD)" \
            --arg releaseVersion "${{ needs.build-and-release.outputs.release_tag }}" \
            --arg publishedAt "$published_at" \
            --arg pdfKey "active/$PROJECT_ID/latest.pdf" \
            --arg sourceKey "active/$PROJECT_ID/latest-source.zip" \
            --arg pdfSha256 "$pdf_sha256" \
            --arg sourceSha256 "$source_sha256" \
            --argjson pdfSize "$pdf_size" \
            --argjson sourceSize "$source_size" \
            '{
              schemaVersion: 1,
              project: $project[0],
              revision: {
                commit: $commit,
                releaseVersion: $releaseVersion,
                publishedAt: $publishedAt
              },
              artifacts: {
                pdf: {
                  key: $pdfKey,
                  bytes: $pdfSize,
                  sha256: $pdfSha256
                },
                source: {
                  key: $sourceKey,
                  bytes: $sourceSize,
                  sha256: $sourceSha256
                }
              }
            }' > "$output/manifest.json"

      - name: Upload current files to private R2
        if: ${{ steps.metadata.outputs.status == 'active' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.r2_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.r2_secret_access_key }}
          AWS_DEFAULT_REGION: auto
          PROJECT_ID: ${{ steps.metadata.outputs.id }}
          PDF_NAME: ${{ needs.build-and-release.outputs.pdf_name }}.pdf
          R2_BUCKET: ${{ inputs.r2_bucket }}
          R2_ENDPOINT: https://${{ secrets.cloudflare_account_id }}.r2.cloudflarestorage.com
        run: |
          set -euo pipefail
          prefix="s3://$R2_BUCKET/active/$PROJECT_ID"
          aws s3 cp "$RUNNER_TEMP/zsf-publish/latest.pdf" "$prefix/latest.pdf" \
            --endpoint-url="$R2_ENDPOINT" \
            --content-type=application/pdf \
            --content-disposition="inline; filename=\"$PDF_NAME\"" \
            --cache-control=no-store \
            --no-progress
          aws s3 cp "$RUNNER_TEMP/zsf-publish/latest-source.zip" "$prefix/latest-source.zip" \
            --endpoint-url="$R2_ENDPOINT" \
            --content-type=application/zip \
            --content-disposition="attachment; filename=\"${PROJECT_ID}-source.zip\"" \
            --cache-control=no-store \
            --no-progress
          aws s3 cp "$RUNNER_TEMP/zsf-publish/manifest.json" "$prefix/manifest.json" \
            --endpoint-url="$R2_ENDPOINT" \
            --content-type=application/json \
            --cache-control=no-store \
            --no-progress

      - name: Remove protected copies after archival
        if: ${{ steps.metadata.outputs.status == 'archive' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.r2_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.r2_secret_access_key }}
          AWS_DEFAULT_REGION: auto
          PROJECT_ID: ${{ steps.metadata.outputs.id }}
          R2_BUCKET: ${{ inputs.r2_bucket }}
          R2_ENDPOINT: https://${{ secrets.cloudflare_account_id }}.r2.cloudflarestorage.com
        run: |
          set -euo pipefail
          prefix="s3://$R2_BUCKET/active/$PROJECT_ID"
          aws s3 rm "$prefix/latest.pdf" --endpoint-url="$R2_ENDPOINT"
          aws s3 rm "$prefix/latest-source.zip" --endpoint-url="$R2_ENDPOINT"
          aws s3 rm "$prefix/manifest.json" --endpoint-url="$R2_ENDPOINT"
