name: Reusable ZSF Release

on:
  workflow_call:
    inputs:
      bump:
        description: SemVer-Komponente, die erhoeht wird
        required: true
        type: string
      release_sha:
        description: Exakter Commit, der gebaut und getaggt wird
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_sha }}

      - name: Determine release version
        id: version
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          case "$BUMP" in
            patch|minor|major) ;;
            *)
              echo "Unsupported bump: $BUMP" >&2
              exit 2
              ;;
          esac

          git fetch --tags --force
          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi
          if [[ ! "$latest_tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Latest tag is not SemVer: $latest_tag" >&2
            exit 1
          fi

          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          case "$BUMP" in
            patch) patch=$((patch + 1)) ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            major) major=$((major + 1)); minor=0; patch=0 ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "latest=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $latest_tag"
          echo "Next tag:   $next_tag"

      - name: Install LaTeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            latexmk \
            texlive-latex-extra \
            texlive-fonts-extra \
            texlive-science \
            texlive-lang-german \
            poppler-utils

      - name: Resolve PDF name
        id: pdf
        run: echo "name=$(make -s print-pdf-basename)" >> "$GITHUB_OUTPUT"

      - name: Build versioned release artifact
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          make clean
          make \
            RELEASE_ID="$RELEASE_TAG" \
            BUILD_STAMP="$(date -u +%Y%m%dT%H%M%SZ)" \
            GIT_COMMIT="${RELEASE_SHA::7}" \
            build
          make release-proof

      - name: Verify PDF release identity
        env:
          PDF_NAME: ${{ steps.pdf.outputs.name }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          metadata="$(pdfinfo "${PDF_NAME}.pdf")"
          grep -F "release=${RELEASE_TAG}" <<< "$metadata"
          grep -F "release-id:${RELEASE_TAG}" <<< "$metadata"

      - name: Create and push release tag
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          git tag "$RELEASE_TAG" "$RELEASE_SHA"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PDF_NAME: ${{ steps.pdf.outputs.name }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            "${PDF_NAME}.pdf" \
            build/main.pdf.sha256 \
            --verify-tag \
            --title "$RELEASE_TAG" \
            --generate-notes
